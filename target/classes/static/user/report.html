<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Report Issue — Civic Issue System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f2f5; color: #333; }
    nav {
      background: #fff; padding: 15px 40px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
    .card {
      background: #fff; padding: 40px; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    h1 { margin-bottom: 24px; text-align: center; }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
    select, input, textarea {
      width: 100%; padding: 12px 14px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 15px; margin-bottom: 20px;
      outline: none; transition: border .2s;
    }
    textarea { height: 100px; resize: vertical; }
    button {
      width: 100%; padding: 14px;
      background: #3B8BD4; color: #fff;
      border: none; border-radius: 8px;
      font-size: 16px; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #2a6fb5; }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 14px; color: #3B8BD4; text-decoration: none; }
    #message { text-align: center; margin-top: 15px; font-size: 14px; }
  </style>
</head>
<body>
<nav>
  <a href="/user/dashboard.html" style="text-decoration:none; color:inherit;"><h2>🏙️ Civic Issue System</h2></a>
  <button onclick="logout()">Logout</button>
</nav>

<div class="container">
  <div class="card">
    <h1>📢 Report Issue</h1>

    <label for="category">Category</label>
    <select id="category">
      <optgroup label="Roads & Infrastructure">
        <option value="POTHOLE">Pothole</option>
        <option value="ROAD_DAMAGE">Road Damage</option>
      </optgroup>
      <optgroup label="Sanitation">
        <option value="GARBAGE">Garbage</option>
        <option value="DRAINAGE">Drainage</option>
        <option value="SEWAGE_BLOCKAGE">Sewage Blockage</option>
      </optgroup>
      <optgroup label="Electricity">
        <option value="STREETLIGHT">Streetlight</option>
        <option value="ELECTRICAL_FAULT">Electrical Fault</option>
      </optgroup>
      <optgroup label="Water">
        <option value="WATER_LEAKAGE">Water Leakage</option>
        <option value="WATER_SUPPLY_ISSUE">Water Supply Issue</option>
      </optgroup>
      <optgroup label="Public Works">
        <option value="PUBLIC_PROPERTY_DAMAGE">Public Property Damage</option>
      </optgroup>
    </select>

    <label for="address">Location Address</label>
    <input type="text" id="address" placeholder="123 Main St, Springfield"/>

    <label for="description">Detailed Description</label>
    <textarea id="description" placeholder="Describe the issue..."></textarea>

    <label for="imageUrl">Image URL (optional)</label>
    <input type="text" id="imageUrl" placeholder="https://example.com/image.jpg"/>

    <button onclick="submitComplaint()">Submit Complaint</button>
    <p id="message"></p>

    <a href="/user/dashboard.html" class="back-link">Back to Dashboard</a>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
  requireAuth("ROLE_USER");

  async function submitComplaint() {
    const category = document.getElementById("category").value;
    const address = document.getElementById("address").value.trim();
    const description = document.getElementById("description").value.trim();
    const imageUrl = document.getElementById("imageUrl").value.trim();
    const messageEl = document.getElementById("message");
    messageEl.textContent = "";

    if (!address || !description) {
      messageEl.textContent = "Please fill in address and description.";
      messageEl.style.color = "#e24b4a";
      return;
    }

    try {
      const data = await apiFetch("/api/user/complaints", {
        method: "POST",
        body: JSON.stringify({ category, address, description, imageUrl })
      });

      if (data?.message) {
        messageEl.textContent = data.message;
        messageEl.style.color = "#1d9e75";
        setTimeout(() => window.location.href = "/user/my-complaints.html", 2000);
      } else {
        messageEl.textContent = data?.error || "Submission failed.";
        messageEl.style.color = "#e24b4a";
      }
    } catch (e) {
      messageEl.textContent = "Server error. Please try again.";
      messageEl.style.color = "#e24b4a";
    }
  }
</script>
</body>
</html>
