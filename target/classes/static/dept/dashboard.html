<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Department Dashboard — Civic Issue System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f2f5; color: #333; }
    nav {
      background: #fff; padding: 15px 40px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
    .welcome { margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .card {
      background: #fff; padding: 30px; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center;
      text-decoration: none; color: inherit; transition: transform .2s;
    }
    .card:hover { transform: translateY(-4px); }
    .card h3 { margin-bottom: 10px; color: #9F77DD; }
    .card p { color: #666; font-size: 14px; }
    .btn-logout {
      background: #f0f2f5; padding: 8px 16px; border-radius: 6px;
      font-size: 14px; font-weight: 500; cursor: pointer; border: none;
    }
  </style>
</head>
<body>
<nav>
  <h2>🏙️ Department Panel</h2>
  <div>
    <span id="user-name" style="margin-right:15px; font-weight:500"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">
  <div class="welcome">
    <h1>Welcome, <span id="welcome-name"></span></h1>
    <p>Manage and resolve issues assigned to your department.</p>
  </div>

  <div class="grid">
    <a href="/dept/complaints.html" class="card">
      <h3>📋 Dept Complaints</h3>
      <p>View and update status of assigned complaints.</p>
    </a>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
  requireAuth("ROLE_DEPT_ADMIN");
  document.getElementById("user-name").textContent = getName();
  document.getElementById("welcome-name").textContent = getName();
</script>
</body>
</html>
