<style>

<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-4 antialiased">
<!-- Login Container: Utilizing Surface Container Low for subtle layering without explicit borders -->
<main class="w-full max-w-md bg-surface-container-low p-8 rounded-lg">
<!-- Header / Brand -->
<div class="mb-10 text-center">
<h1 class="font-['Inter'] text-2xl font-black text-on-surface tracking-tight uppercase mb-2">Sovereign Ledger</h1>
<p class="text-secondary text-sm font-['Inter']">Civic Issue Reporting System</p>
</div>
<!-- Form: Using Surface Container Lowest for inputs to "set" them into the page -->
<form class="space-y-6" onsubmit="event.preventDefault(); handleLogin();">
<div class="space-y-2">
<label class="block font-['Inter'] text-[0.6875rem] uppercase tracking-[0.05em] text-secondary font-semibold" for="email">Official Email Address</label>
<div class="relative bg-surface-container-lowest rounded-DEFAULT ghost-border ghost-border-focus transition-shadow duration-200">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-secondary text-[1.25rem]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-transparent border-none text-on-surface text-sm focus:ring-0 placeholder-secondary/50" id="email" name="email" placeholder="agent@municipal.gov" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-['Inter'] text-[0.6875rem] uppercase tracking-[0.05em] text-secondary font-semibold" for="password">Security Clearance Code</label>
<div class="relative bg-surface-container-lowest rounded-DEFAULT ghost-border ghost-border-focus transition-shadow duration-200">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-secondary text-[1.25rem]">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-transparent border-none text-on-surface text-sm focus:ring-0 placeholder-secondary/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center justify-between mt-2 mb-8">
<div class="flex items-center">
<input class="h-4 w-4 bg-surface-container-lowest border-outline-variant/20 rounded-DEFAULT text-primary-container focus:ring-primary-container focus:ring-offset-background" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-xs text-secondary font-['Inter']" for="remember-me">
                        Maintain Session
                    </label>
</div>
<div class="text-xs">
<a class="font-medium text-primary hover:text-on-surface transition-colors font-['Inter']" href="/register.html">Create an Account</a>
</div>
</div>
<div>
<!-- Primary Button: Solid primary_container per guidelines, shifting to primary on hover -->
<p id="error" class="text-error text-xs text-center mb-2 h-4"></p>
<button class="w-full flex justify-center py-3 px-4 rounded-lg shadow-sm text-sm font-semibold text-on-primary-container bg-primary-container hover:bg-primary hover:text-on-primary transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-background focus:ring-primary" type="submit">
                    Initiate Secure Session
                    <span class="material-symbols-outlined ml-2 text-[1.25rem]">login</span>
</button>
</div>
</form>
<!-- Footer / Metadata -->
<div class="mt-8 pt-6 border-t border-surface-container-high text-center">
<a href="/index.html" class="text-xs text-secondary hover:text-primary transition-colors block mb-2">← Back to Landing Page</a>
<p class="text-[0.6875rem] text-secondary font-['Inter'] uppercase tracking-widest">
                Authorized Personnel Only
            </p>
</div>
</main>

<script src="/js/auth.js"></script>
<script>
  if (typeof getToken === 'function' && getToken()) redirectByRole(getRole());

  async function handleLogin() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorEl = document.getElementById("error");
    errorEl.textContent = "";

    if (!email || !password) {
      errorEl.textContent = "Please enter email and password.";
      return;
    }

    try {
      const data = await apiFetch("/api/auth/login", {
        method: "POST",
        body: JSON.stringify({ email, password })
      });

      if (data?.token) {
        localStorage.setItem("token", data.token);
        localStorage.setItem("role", data.role);
        localStorage.setItem("name", data.name);
        localStorage.setItem("email", data.email);
        redirectByRole(data.role);
      } else {
        errorEl.textContent = data?.message || "Login failed. Check credentials.";
      }
    } catch (e) {
      errorEl.textContent = "Server error. Please try again.";
    }
  }

  function redirectByRole(role) {
    if (role === "ROLE_MAIN_ADMIN") window.location.href = "/admin/dashboard.html";
    else if (role === "ROLE_DEPT_ADMIN") window.location.href = "/dept/dashboard.html";
    else window.location.href = "/user/dashboard.html";
  }
</script>
</body>
</html>
